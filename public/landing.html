<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlataYa — Enviando más que dinero</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; }
:root {
  --navy: #1A3560;
  --teal: #2E9E82;
  --gold: #D99420;
  --cream: #F7F2EA;
  --white: #FFFFFF;
}
body { font-family: 'DM Sans', sans-serif; background: #0C1C35; overflow: hidden; }

/* INTRO */
#intro {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--cream);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 0;
}
#intro.exit { animation: iOut 0.9s 0.2s ease forwards; }
@keyframes iOut { to { opacity: 0; visibility: hidden; pointer-events: none; } }

.i-logo {
  width: 320px;
  opacity: 0; transform: scale(0.85);
  animation: iLogo 0.9s 0.4s cubic-bezier(0.34,1.3,0.64,1) forwards;
}
@keyframes iLogo { to { opacity: 1; transform: scale(1); } }

.i-slogan {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 21px; font-weight: 300;
  color: #8A9BB0; margin-top: 20px;
  opacity: 0; animation: iSlog 0.7s 1.2s ease forwards;
  letter-spacing: 0.01em;
}
@keyframes iSlog { to { opacity: 1; } }

/* SITE */
#site { opacity: 1; width: 100%; height: 100vh; }

/* HERO */
.hero {
  position: relative; width: 100%; height: 100vh;
  display: flex; flex-direction: column;
  justify-content: flex-end; overflow: hidden;
}

.hero-fallback {
  position: absolute; inset: 0; z-index: 0;
  background: linear-gradient(160deg, #8BA8C4 0%, #C4A060 35%, #8C5830 65%, #3A2010 100%);
}

.hero-video {
  position: absolute; inset: 0; z-index: 1;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center;
}

.hero-ov1 {
  position: absolute; inset: 0; z-index: 2;
  background: linear-gradient(to bottom,
    rgba(10,22,48,0.42) 0%, transparent 35%,
    transparent 42%, rgba(10,22,48,0.62) 70%,
    rgba(10,22,48,0.90) 100%);
}
.hero-ov2 {
  position: absolute; inset: 0; z-index: 2;
  background: linear-gradient(to right,
    rgba(10,22,48,0.52) 0%, rgba(10,22,48,0.12) 55%, transparent 100%);
}

/* NAV */
nav {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  padding: 28px 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-logo { display: flex; align-items: center; text-decoration: none; }
.nav-logo img { height: 44px; }
.nav-links { display: flex; gap: 40px; list-style: none; }
.nav-links a { font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.72); text-decoration: none; transition: color 0.2s; }
.nav-links a:hover { color: white; }
.nav-btn { background: white; color: var(--navy); padding: 11px 26px; border-radius: 100px; font-size: 14px; font-weight: 600; text-decoration: none; transition: all 0.25s; box-shadow: 0 2px 16px rgba(0,0,0,0.15); }
.nav-btn:hover { background: var(--gold); color: white; transform: translateY(-1px); }

/* CONTENT */
.hero-content {
  position: relative; z-index: 5;
  padding: 0 56px 96px; max-width: 880px;
}

.hero-badge {
  display: inline-flex; align-items: center; gap: 9px;
  background: rgba(255,255,255,0.1); backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.18); border-radius: 100px;
  padding: 8px 18px; font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.85); letter-spacing: 0.1em;
  text-transform: uppercase; margin-bottom: 28px;
}
.bdot { width: 7px; height: 7px; background: var(--gold); border-radius: 50%; animation: bd 2.5s ease-in-out infinite; }
@keyframes bd { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(1.7)} }

h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(64px, 8vw, 112px);
  font-weight: 300; line-height: 0.95;
  letter-spacing: -0.03em; color: white; margin-bottom: 22px;
}
h1 em { font-style: italic; color: var(--gold); }

.hero-sub {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(20px, 2.2vw, 28px);
  font-style: italic; font-weight: 300;
  color: rgba(255,255,255,0.62); margin-bottom: 48px;
}

.hero-actions { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }

.btn-main {
  background: white; color: var(--navy);
  padding: 18px 44px; border-radius: 100px;
  font-size: 16px; font-weight: 600; text-decoration: none;
  transition: all 0.3s; box-shadow: 0 4px 28px rgba(0,0,0,0.22);
}
.btn-main:hover { background: var(--gold); color: white; transform: translateY(-3px); box-shadow: 0 16px 44px rgba(0,0,0,0.28); }

.btn-ghost {
  color: rgba(255,255,255,0.75); font-size: 15px; font-weight: 400;
  text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.3);
  padding-bottom: 3px; transition: all 0.25s;
  display: inline-flex; align-items: center; gap: 8px;
}
.btn-ghost:hover { color: white; border-color: white; gap: 14px; }

/* STATS */
.hero-stats { position: absolute; right: 0; bottom: 0; z-index: 6; display: flex; }
.hstat {
  padding: 22px 30px;
  border-top: 1px solid rgba(255,255,255,0.1);
  border-left: 1px solid rgba(255,255,255,0.1);
  background: rgba(10,22,48,0.5); backdrop-filter: blur(20px);
  text-align: center; min-width: 130px;
}
.hstat:first-child { border-top-left-radius: 20px; }
.hstat-n { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 400; color: white; line-height: 1; }
.hstat-n em { font-style: normal; color: var(--gold); }
.hstat-l { font-size: 11px; color: rgba(255,255,255,0.48); margin-top: 5px; letter-spacing: 0.05em; }

/* SCROLL */
.scroll-hint {
  position: absolute; bottom: 40px; left: 56px; z-index: 6;
  display: flex; align-items: center; gap: 12px;
  color: rgba(255,255,255,0.38); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
}
.scroll-line { width: 52px; height: 1px; background: rgba(255,255,255,0.25); position: relative; overflow: hidden; }
.scroll-line::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: white; animation: sl 2.8s ease-in-out infinite; }
@keyframes sl { 0%{left:-100%} 60%{left:100%} 100%{left:100%} }

@media (max-width: 768px) {
  /* Intro */
  .i-logo { width: 200px; }
  .i-slogan { font-size: 16px; margin-top: 14px; }

  /* Nav */
  nav { padding: 16px 20px; }
  .nav-links { display: none; }
  .nav-logo img { height: 32px; }
  .nav-btn { padding: 9px 18px; font-size: 13px; }

  /* Hero content */
  .hero-content { padding: 0 20px 40px; max-width: 100%; }

  /* Badge */
  .hero-badge { font-size: 10px; padding: 6px 14px; margin-bottom: 18px; }

  /* Heading */
  h1 { font-size: clamp(40px, 12vw, 64px); margin-bottom: 14px; }

  /* Subtitle */
  .hero-sub { font-size: 18px; margin-bottom: 28px; }

  /* Buttons */
  .hero-actions { flex-direction: column; align-items: flex-start; gap: 14px; }
  .btn-main { padding: 14px 32px; font-size: 15px; }
  .btn-ghost { font-size: 14px; }

  /* Stats */
  .hero-stats { display: none; }

  /* Scroll hint */
  .scroll-hint { left: 20px; bottom: 16px; }

  /* Video position for mobile */
  .hero-video { object-position: center center; }
}

</style>
</head>
<body>


<!-- SITE -->
<div id="site">
  <section class="hero">
    <div class="hero-fallback"></div>
    <video class="hero-video" autoplay muted loop playsinline preload="auto">
      <source src="Test_footage-3_5_2026__5_59_PM.mp4?v=2" type="video/mp4">
    </video>
    <div class="hero-ov1"></div>
    <div class="hero-ov2"></div>

    <nav>

      <ul class="nav-links">
        <li><a href="#">Cómo Funciona</a></li>
        <li><a href="#">Tasas</a></li>
        <li><a href="#">Nosotros</a></li>
      </ul>
      <a href="#" class="nav-btn">Enviar Ahora</a>
    </nav>

    <div class="hero-content">
      <div class="hero-badge">
        <span class="bdot"></span>
        EE.UU. → República Dominicana · En minutos
      </div>
      <h1>Más que<br>dinero,<br><em>amor.</em></h1>
      <p class="hero-sub">Enviando más que dinero</p>
      <div class="hero-actions">
        <a href="#" class="btn-main">Enviar Dinero →</a>
        <a href="#" class="btn-ghost">Ver cómo funciona ↓</a>
      </div>
    </div>

    <div class="hero-stats">
      <div class="hstat"><div class="hstat-n">3<em>%</em></div><div class="hstat-l">vs 5–8% competidores</div></div>
      <div class="hstat"><div class="hstat-n">&lt;5<em>min</em></div><div class="hstat-l">tiempo promedio</div></div>
      <div class="hstat"><div class="hstat-n">$0</div><div class="hstat-l">primera transferencia</div></div>
    </div>

    <div class="scroll-hint"><div class="scroll-line"></div>Explorar</div>
  </section>
</div>

</body>
</html>
